<div class="course-registration-container">
  <!-- Header Section -->
  <div class="page-header">
    <div class="header-content">
      <div class="header-info">
        <h1 class="page-title">
          <i class="fas fa-book-open"></i>
          Cadastro de Curso
        </h1>
        <p class="page-subtitle">Registre novos cursos e atribua-os aos usuários</p>
      </div>
      <!-- Botão de ação principal, se houver -->
    </div>
  </div>

  <!-- Formulário de Cadastro -->
  <div class="form-card">
    <form (ngSubmit)="registerCourse()" #courseForm="ngForm">
      <div class="form-grid">
        <div class="form-group full-width">
          <label class="form-label" for="title">Título do Curso *</label>
          <input id="title"
                 class="form-input"
                 [(ngModel)]="course.title"
                 name="title"
                 required
                 placeholder="Ex: Introdução ao Angular">
        </div>

        <div class="form-group full-width">
          <label class="form-label" for="description">Descrição *</label>
          <textarea id="description"
                    class="form-textarea"
                    [(ngModel)]="course.description"
                    name="description"
                    rows="4"
                    required
                    placeholder="Descrição detalhada do curso"></textarea>
        </div>

        <div class="form-group full-width">
          <label class="form-label" for="videoUrl">URL da Vídeo Aula *</label>
          <input id="videoUrl"
                 class="form-input"
                 [(ngModel)]="course.videoUrl"
                 name="videoUrl"
                 required
                 placeholder="Ex: https://youtube.com/watch?v=...">
        </div>
      </div>

      <!-- Seção de Atribuição de Usuários -->
      <h3 class="section-title">Atribuir a Usuários</h3>
      <div class="user-assignment-grid">
        <div class="user-checkbox" *ngFor="let user of availableUsers">
          <input
            type="checkbox"
            [id]="'user-' + user.id"
            [value]="user.id"
            (change)="toggleUserAssignment(user.id)"
            [checked]="(selectedUsers || []).includes(user.id ?? 0)"
          >
          <label [for]="'user-' + user.id">{{ user.username }} ({{ user.email }})</label>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit"
                class="btn-primary-modern"
                [disabled]="courseForm.invalid || selectedUsers.length === 0 || isLoading">
          <i class="fas fa-save"></i>
          <span>{{ isLoading ? 'Cadastrando...' : 'Cadastrar Curso' }}</span>
          <div class="spinner" *ngIf="isLoading"></div>
        </button>
      </div>
    </form>
  </div>

  <div class="message-info" *ngIf="message">
    <p>{{ message }}</p>
  </div>
</div>
