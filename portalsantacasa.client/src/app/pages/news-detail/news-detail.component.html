<div class="news-detail-container">
  <div class="news-detail-wrapper">

    <div *ngIf="isLoading" class="loading-state"><p>Carregando...</p></div>

    <article *ngIf="news && !isLoading" class="article-card">
      <header class="article-header">
        <button (click)="voltar()" class="btn-back"><i class="fas fa-arrow-left"></i> Voltar</button>
        <h1 class="article-title">{{ news.title }}</h1>
        <p class="article-summary" *ngIf="news.summary">{{ news.summary }}</p>
      </header>

      <div class="article-layout-grid" [ngClass]="{'layout-vertical': isVertical, 'layout-horizontal': !isVertical}">
        <section class="article-content">
          <div [innerHTML]="news.content" class="news-body"></div>
        </section>

        <section *ngIf="news.imageUrl" class="article-image-section">
          <div class="article-image">
            <img [src]="news.imageUrl" [alt]="news.title" (load)="checkOrientation($event)" />
          </div>
        </section>
      </div>
    </article>
  </div>
</div>
